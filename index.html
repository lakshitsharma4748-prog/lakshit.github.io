<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Bio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      padding: 30px;
    }

    .card {
      max-width: 400px;
      margin: auto;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0;
    }

    p {
      color: #cbd5e1;
      font-size: 14px;
    }

    .link {
      display: block;
      margin: 12px 0;
      padding: 12px;
      border-radius: 12px;
      background: #334155;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .link:hover {
      background: #475569;
      transform: scale(1.05);
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="https://via.placeholder.com/120">
    
    <h1>Your Name</h1>
    <p>🚀 Content Creator | Earn Online</p>

    <a class="link" href="#">🎥 YouTube</a>
    <a class="link" href="#">📸 Instagram</a>
    <a class="link" href="#">💬 WhatsApp</a>
    <a class="link" href="#">💰 My Store</a>

    <footer>Made with ❤️</footer>
  </div>

</body>
</html>
